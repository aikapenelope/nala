name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: Typecheck + Lint + Test + Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: nova_test
          POSTGRES_USER: nova
          POSTGRES_PASSWORD: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck packages
        run: npx turbo typecheck

      - name: Lint
        run: npx turbo lint

      - name: Test
        run: npx turbo test
        env:
          DATABASE_URL: postgresql://nova:test@localhost:5432/nova_test
          REDIS_URL: redis://localhost:6379

      - name: Build
        run: npx turbo build
        env:
          DATABASE_URL: postgresql://nova:test@localhost:5432/nova_test
          REDIS_URL: redis://localhost:6379

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: check

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: nova_test
          POSTGRES_USER: nova
          POSTGRES_PASSWORD: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build all packages
        run: npx turbo build
        env:
          DATABASE_URL: postgresql://nova:test@localhost:5432/nova_test
          REDIS_URL: redis://localhost:6379
          NUXT_PUBLIC_API_BASE: http://localhost:3001
          NUXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_Y2xlcmsudGVzdC5sY2wuZGV2JA

      - name: Fix Clerk shared module for Nuxt SSR
        run: |
          rm -rf apps/web/.output/server/node_modules/@clerk/shared
          cp -r node_modules/@clerk/nuxt/node_modules/@clerk/shared apps/web/.output/server/node_modules/@clerk/shared

      - name: Apply DB migrations and RLS
        run: |
          psql "$DATABASE_URL" -c "CREATE EXTENSION IF NOT EXISTS \"uuid-ossp\"; CREATE EXTENSION IF NOT EXISTS \"pg_trgm\";"
          psql "$DATABASE_URL" -c "CREATE EXTENSION IF NOT EXISTS \"vector\";" || echo "pgvector extension not available (OK for tests)"
          cd packages/db && node migrate.mjs && cd ../..
          psql "$DATABASE_URL" -f packages/db/init.sql
        env:
          DATABASE_URL: postgresql://nova:test@localhost:5432/nova_test

      - name: Run E2E tests
        run: npx playwright test --project=chromium
        env:
          DATABASE_URL: postgresql://nova:test@localhost:5432/nova_test
          REDIS_URL: redis://localhost:6379
          NUXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_Y2xlcmsudGVzdC5sY2wuZGV2JA
          NUXT_CLERK_SECRET_KEY: sk_test_e2e_fake_secret_key

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
