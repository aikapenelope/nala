##
# Nova - Local development services.
#
# Usage:
#   docker compose up -d        # Start all services
#   docker compose down          # Stop all services
#   docker compose down -v       # Stop and remove volumes (reset data)
#
# Services:
#   PostgreSQL 16 (pgvector + pg_trgm) - port 5432
#   Redis 7                             - port 6379
#   MinIO (S3-compatible storage)       - port 9000 (API), 9001 (console)
##

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: nova-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: nova
      POSTGRES_USER: nova
      POSTGRES_PASSWORD: nova
    volumes:
      - nova-postgres-data:/var/lib/postgresql/data
      - ./packages/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nova"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nova-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - nova-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: nova-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: nova
      MINIO_ROOT_PASSWORD: novapassword
    volumes:
      - nova-minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  nova-postgres-data:
  nova-redis-data:
  nova-minio-data:
